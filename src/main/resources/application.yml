spring:
  application:
    name: carpool
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/carpool}
    database: ${MONGODB_DATABASE:carpool}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: user:email
        provider:
          github:
            user-name-attribute: login

server:
  address: 0.0.0.0
  port: 8080
  servlet:
    session:
      timeout: 15m

jwt:
  secret: ${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
  expiration-ms: 86400000

googleMaps:
  apiKey: "${GOOGLE_MAPS_API_KEY:}"
  geocodingBaseUrl: "https://maps.googleapis.com/maps/api/geocode/json"
  geocodeCacheTtlSeconds: 86400
  routesBaseUrl: "https://routes.googleapis.com/directions/v2:computeRoutes"
  routesCacheTtlSeconds: 1800
  fallbackKmh: 35.0

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: "always"

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:production}
  traces-sample-rate: 1.0
  send-default-pii: true
