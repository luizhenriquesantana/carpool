# fly.toml app configuration file generated for carpool-route-planning on 2026-05-18T14:49:52+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'carpool-route-planning'
primary_region = 'lhr'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [[http_service.checks]]
    interval = 30
    timeout = 20
    grace_period = 60
    method = "GET"
    path = "/actuator/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
